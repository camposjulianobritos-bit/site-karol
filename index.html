<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pra Karol ❤️</title>

<style>
body {
    background: black;
    color: white;
    text-align: center;
    font-family: Arial;
}

/* BOTÃO GRANDE */
.botao {
    margin-top: 120px;
    padding: 25px;
    border: 3px solid #ff4d6d;
    display: inline-block;
    cursor: pointer;
    font-size: 28px;
    border-radius: 15px;
}

/* CARTA */
#carta {
    display: none;
    margin-top: 40px;
}

/* FOTO GRANDE */
img {
    width: 300px;
    border-radius: 50%;
}

/* TEXTO GRANDE */
#texto {
    font-size: 26px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="botao" onclick="abrir()">💌 Toque aqui</div>

<div id="carta">
    <img src="foto.png">
    <p id="texto"></p>
</div>

<audio id="music">
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
function abrir() {
    document.getElementById("carta").style.display = "block";

    const music = document.getElementById("music");
    music.play().catch(()=>{});

    const frases = [
        "faz tempo né...",
        "mesmo depois de anos sem a gente se falar...",
        "eu percebi uma coisa...",
        "tem sentimento que não vai embora...",
        "Karol ❤️"
    ];

    let i = 0;
    const texto = document.getElementById("texto");

    setInterval(() => {
        if (i < frases.length) {
            texto.innerHTML = frases[i];
            i++;
        }
    }, 2000);
}
</script>

</body>
</html>
