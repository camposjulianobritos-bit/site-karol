<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #1a1a1a, black);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
    overflow: hidden;
}

/* envelope */
.envelope {
    width: 220px;
    height: 140px;
    background: #ff4d6d;
    position: relative;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: 0 0 20px #ff4d6d;
    transition: 0.6s;
}

.envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    border-left: 110px solid transparent;
    border-right: 110px solid transparent;
    border-bottom: 80px solid #ff2e55;
    transition: 0.6s;
    transform-origin: top;
}

.envelope.aberto {
    transform: translateY(-60px);
    opacity: 0;
}

/* carta */
#carta {
    display: none;
    text-align: center;
    max-width: 750px;
    padding: 25px;
    animation: aparecer 1s ease forwards;
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
