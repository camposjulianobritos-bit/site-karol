<head>
<meta charset="UTF-8">
<title>Pra Karol ❤️</title>

<!-- ✍️ FONTE ESCRITA À MÃO -->
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #1a1a1a, black);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    color: white;
    overflow: hidden;
}

/* ENVELOPE (igual) */
.envelope {
    width: 220px;
    height: 140px;
    background: #ff4d6d;
    position: relative;
    cursor: pointer;
    border-radius: 8px;
    box-shadow: 0 0 20px #ff4d6d;
    transition: 0.6s;
}

.envelope::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    border-left: 110px solid transparent;
    border-right: 110px solid transparent;
    border-bottom: 80px solid #ff2e55;
    transition: 0.6s;
    transform-origin: top;
}

.envelope.aberto {
    transform: translateY(-60px);
    opacity: 0;
}

/* CARTA */
#carta {
    display: none;
    text-align: center;
    max-width: 750px;
    padding: 25px;
    animation: aparecer 1s ease forwards;
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* FOTO */
img {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    border: 4px solid #ff4d6d;
    box-shadow: 0 0 25px #ff4d6d;
    object-fit: cover;
    margin-bottom: 15px;
}

/* ✍️ TEXTO ESCRITO À MÃO */
#texto {
    font-family: 'Dancing Script', cursive;
    font-size: 34px;
    line-height: 1.8;
    white-space: pre-line;
    text-align: center;
}

/* ❤️ coração */
.heart {
    font-size: 40px;
    animation: pulse 1s infinite;
    margin-bottom: 10px;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* chuva de corações */
.heart-fall {
    position: absolute;
    top: -50px;
    color: #ff4d6d;
    font-size: 22px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
        opacity: 0;
    }
}
</style>
</head>
